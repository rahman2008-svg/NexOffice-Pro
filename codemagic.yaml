workflows:
  android-debug:
    name: NexOffice Pro Debug Build

    max_build_duration: 60

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.kotlin

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Checkout code
        script: |
          echo "🚀 Starting NexOffice Pro Build"

      - name: Grant permissions
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
