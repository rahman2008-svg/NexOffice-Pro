workflows:
  android-build:
    name: NexOffice Pro Build

    max_build_duration: 60

    environment:
      java: 17

      # 🔐 IMPORTANT: Codemagic Dashboard এ যে keystore add করেছো তার নাম এখানে দিতে হবে
      android_signing:
        - keystore_reference

      vars:
        PACKAGE_NAME: "com.nexvora.nexoffice"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: Checkout code
        script: |
          echo "Building NexOffice Pro..."

      - name: Grant permissions
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Run tests
        script: |
          ./gradlew test

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease

      - name: Build AAB (Play Store)
        script: |
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/bundle/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com
