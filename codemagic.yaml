workflows:
  android-release:
    name: NexOffice Pro - Android Build
    max_build_duration: 60

    environment:
      java: 17
      android_signing:
        - keystore_reference

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: Checkout
        script: |
          echo "Starting NexOffice Pro Build..."

      - name: Set Gradle Permissions
        script: |
          chmod +x ./gradlew

      - name: Clean Project
        script: |
          ./gradlew clean

      - name: Run Tests
        script: |
          ./gradlew test

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com
